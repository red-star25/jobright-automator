<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px;
      margin: 0;
      color: #1a1a1a;
    }
    h1 {
      font-size: 15px;
      margin: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .brand img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    select, button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button.primary {
      background: #2fa86f;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:disabled {
      background: #9bd4b8;
      cursor: not-allowed;
    }
    button.secondary {
      background: white;
      cursor: pointer;
    }
    .hint {
      font-size: 11px;
      color: #777;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #f7fffb;
      border: 1px solid #d8f2e5;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 10px 0 10px;
      font-size: 12px;
    }
    .toggle-row .toggle-text strong { display: block; font-size: 13px; }
    .toggle-row .toggle-text span { color: #666; font-size: 11px; }
    .switch { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #c9c9c9;
      transition: .18s;
      border-radius: 999px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: .18s;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .switch input:checked + .slider { background: #2fa86f; }
    .switch input:checked + .slider:before { transform: translateX(18px); }
    .field-label { font-size:12px; font-weight:600; margin:8px 0 4px; display:block; }
    .control-row { display:grid; grid-template-columns:1fr; gap:6px; margin-bottom:8px; }
    select.compact { margin-bottom:0; }
    #stats {
      display: flex;
      gap: 8px;
      margin: 10px 0 8px;
    }
    #stats .stat {
      flex: 1;
      text-align: center;
      background: #f7f7f7;
      border-radius: 6px;
      padding: 8px 4px;
    }
    #stats .stat span {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }
    #stats .stat label {
      font-size: 10px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="icons/icon48.png" alt="InsiderReach logo" />
    <h1>InsiderReach</h1>
  </div>
  <div class="hint">Referral outreach, faster. Open a Jobright job page with an Insider Connection list, pick a resume, then hit Start.</div>

  <label for="resumeSelect" style="font-size:12px;">Resume to attach</label>
  <select id="resumeSelect"></select>

  <label for="runModeSelect" class="field-label">Run mode</label>
  <select id="runModeSelect" class="compact">
    <option value="both">Email + LinkedIn</option>
    <option value="email_only">Email only</option>
    <option value="linkedin_only">LinkedIn only</option>
  </select>

  <label for="aiModeSelect" class="field-label">AI Rewrite</label>
  <select id="aiModeSelect" class="compact">
    <option value="off">Off - use Jobright original</option>
    <option value="ask">Ask every time</option>
    <option value="auto_rewrite">Auto Rewrite, then preview</option>
    <option value="auto_pro">Auto Rewrite Pro, then preview</option>
  </select>
  <div class="hint" id="aiModeHint">Choose how InsiderReach uses AI before each send.</div>

  <button id="startBtn" class="primary">Preview + Start</button>
  <button id="optionsBtn" class="secondary">Manage resumes</button>

  <div id="stats">
    <div class="stat"><span id="statToday">0</span><label>Today</label></div>
    <div class="stat"><span id="statTotal">0</span><label>Total</label></div>
    <div class="stat"><span id="statRate">0%</span><label>Reply rate</label></div>
  </div>
  <button id="dashboardBtn" class="secondary">View outreach log</button>


  <script src="popup.js"></script>
</body>
</html>
