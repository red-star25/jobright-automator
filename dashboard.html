<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>InsiderReach Outreach Log</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 30px auto;
      padding: 0 16px;
      color: #1a1a1a;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: #777; font-size: 13px; margin-bottom: 20px; }

    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      flex: 1;
      background: #f7f7f7;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 26px;
      font-weight: 700;
    }
    .stat-card .lbl {
      font-size: 12px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid #eee;
    }
    th {
      color: #777;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .channel-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .channel-email { background: #e6f4ff; color: #0958d9; }
    .channel-linkedin { background: #e6f7ee; color: #0a7a3d; }

    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      background: #f0f0f0;
      color: #555;
    }
    .status-replied { background: #e6f7ee; color: #0a7a3d; }

    button.reply-btn {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }
    button.reply-btn:hover { background: #f5f5f5; }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .top-actions button {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }
    .empty {
      color: #777;
      font-size: 13px;
      padding: 30px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>InsiderReach Outreach Log</h1>
  <div class="sub">Everyone InsiderReach has reached out to, used to avoid double-messaging and to show your stats.</div>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statToday">0</div><div class="lbl">Today</div></div>
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num" id="statReplied">0</div><div class="lbl">Replied</div></div>
    <div class="stat-card"><div class="num" id="statRate">0%</div><div class="lbl">Reply rate</div></div>
  </div>

  <div class="top-actions">
    <button id="clearBtn">Clear log</button>
  </div>

  <div id="tableWrap"></div>

  <script src="dashboard.js"></script>
</body>
</html>
