<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 30px auto;
      color: #1a1a1a;
    }
    h1 { font-size: 18px; margin-bottom: 4px; }
    h2 {
      font-size: 14px;
      margin: 22px 0 8px;
      padding-top: 18px;
      border-top: 1px solid #eee;
    }
    h2:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
    input[type="file"] { margin: 10px 0; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin: 12px 0 5px;
    }
    input[type="text"], select, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      font-size: 13px;
    }
    textarea { min-height: 110px; resize: vertical; }
    .save-row { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
    .save-row button { padding: 7px 12px; border-radius: 6px; border: none; background: #2fa86f; color: white; cursor: pointer; }
    .small-note { font-size: 12px; color: #666; line-height: 1.4; margin: 6px 0 0; }
    #aiStatus { font-size: 12px; color: #2fa86f; }
    .account-box {
      border: 1px solid #d8f2e5;
      background: #f7fffb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 4px;
    }
    .pro-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #2fa86f;
      color: white;
      font-size: 11px;
      font-weight: 700;
      vertical-align: middle;
    }
    .usage-bar {
      height: 8px;
      background: #e8e8e8;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }
    .usage-bar > span {
      display: block;
      height: 100%;
      background: #2fa86f;
    }
    .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn-row button, .btn-row a.button-link {
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      font-size: 12px;
      text-decoration: none;
      color: inherit;
      display: inline-block;
    }
    .btn-row button.primary-btn {
      background: #2fa86f;
      color: white;
      border: none;
    }
    #accountStatus { margin-top: 8px; }
  </style>
</head>
<body>
  <h1>InsiderReach Settings</h1>

  <h2>Resumes</h2>
  <p class="small-note">Upload PDF resumes to attach when sending email outreach.</p>
  <input type="file" id="fileInput" accept="application/pdf,.pdf,text/plain,.txt,.md" multiple />
  <p id="uploadStatus" class="small-note"></p>

  <h2>Account</h2>
  <div class="account-box">
    <div id="accountSummary">Not signed in.</div>
    <div id="usageSummary"></div>
    <div class="btn-row">
      <button type="button" id="signInBtn" class="primary-btn">Sign in</button>
      <button type="button" id="signOutBtn">Sign out</button>
      <button type="button" id="upgradeBtn" class="primary-btn">Upgrade to Pro</button>
      <a id="manageLink" class="button-link" href="#" target="_blank" rel="noopener">Manage account</a>
    </div>
    <p id="accountStatus" class="small-note"></p>
  </div>

  <h2>Outreach defaults</h2>
  <label for="runMode">Run mode</label>
  <select id="runMode">
    <option value="both">Email + LinkedIn</option>
    <option value="email_only">Email only</option>
    <option value="linkedin_only">LinkedIn only</option>
  </select>

  <label for="aiMode">AI Rewrite</label>
  <select id="aiMode">
    <option value="off">Off — use Jobright original</option>
    <option value="ask">Ask every time</option>
    <option value="auto_rewrite">Auto Rewrite</option>
    <option value="auto_pro">Auto Rewrite Pro</option>
  </select>

  <label for="defaultTone">Default tone</label>
  <select id="defaultTone">
    <option>Professional</option>
    <option>Friendly</option>
    <option>Concise</option>
    <option>Confident</option>
    <option>Warm referral ask</option>
    <option>Student/new grad</option>
    <option>Recruiter-style</option>
  </select>

  <label for="userName">Your name</label>
  <input type="text" id="userName" placeholder="Used in message signatures" />

  <label for="customInstructions">Custom AI instructions</label>
  <textarea id="customInstructions" placeholder="Optional. Example: Mention I'm a CS Master's student. Keep the ask low-pressure."></textarea>

  <label for="resumeText">Resume text for Rewrite Pro</label>
  <textarea id="resumeText" placeholder="Paste resume text here for better Rewrite Pro results."></textarea>
  <p class="small-note">If PDF upload doesn't extract cleanly, paste your resume text here.</p>

  <div class="save-row">
    <button id="saveAiBtn">Save settings</button>
    <span id="aiStatus"></span>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="options.js"></script>
</body>
</html>
